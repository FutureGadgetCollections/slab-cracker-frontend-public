name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true
      - name: Build
        run: hugo --minify --baseURL "${{ vars.PAGES_BASE_URL }}"
        env:
          HUGO_PARAMS_GCS_DATA_BUCKET: ${{ vars.HUGO_PARAMS_GCS_DATA_BUCKET }}
          HUGO_PARAMS_GITHUB_DATA_REPO: ${{ vars.HUGO_PARAMS_GITHUB_DATA_REPO }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
