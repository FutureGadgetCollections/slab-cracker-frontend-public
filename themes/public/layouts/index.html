{{ define "main" }}
<div class="text-center mt-5 mb-4">
  <i class="bi bi-search fs-1 text-primary"></i>
  <h1 class="h3 mt-2">{{ .Site.Title }}</h1>
  <p class="text-muted">{{ .Site.Params.description }}</p>
</div>

<div class="row g-3 mb-4" id="stats-row">
  <div class="col-md-3">
    <div class="card shadow-sm border-0 text-center p-3">
      <div class="text-muted small">Reference 10s</div>
      <div class="fs-3 fw-bold text-primary" id="stat-references">--</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card shadow-sm border-0 text-center p-3">
      <div class="text-muted small">Cards Analyzed</div>
      <div class="fs-3 fw-bold text-info" id="stat-scans">--</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card shadow-sm border-0 text-center p-3">
      <div class="text-muted small">Analyses Run</div>
      <div class="fs-3 fw-bold text-warning" id="stat-analyses">--</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card shadow-sm border-0 text-center p-3">
      <div class="text-muted small">Top Candidates</div>
      <div class="fs-3 fw-bold text-success" id="stat-candidates">--</div>
    </div>
  </div>
</div>

<div class="text-center">
  <a href="{{ "results/" | relURL }}" class="btn btn-primary">
    <i class="bi bi-bar-chart me-1"></i>View Analysis Results
  </a>
</div>
{{ end }}

{{ define "page-scripts" }}
<script>
  (async () => {
    try {
      const stats = await loadJsonData('data/stats.json');
      if (stats) {
        document.getElementById('stat-references').textContent = stats.reference_count || 0;
        document.getElementById('stat-scans').textContent = stats.scan_count || 0;
        document.getElementById('stat-analyses').textContent = stats.analysis_count || 0;
        document.getElementById('stat-candidates').textContent = stats.candidate_count || 0;
      }
    } catch (e) {}
  })();
</script>
{{ end }}
